name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: budget_warden
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d budget_warden"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BUDGET_WARDEN_POSTGRES_URL: postgres://postgres:postgres@localhost:5432/budget_warden
      BUDGET_WARDEN_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic
      - run: cargo test --all-features
      - run: cargo test --all-features --test store_contract
      - run: cargo llvm-cov --all-features --ignore-filename-regex 'src/store/(postgres|redis_store)\.rs' --fail-under-lines 90 --lcov --output-path target/lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: target/lcov.info
      - run: cargo audit
      - run: cargo deny check
      - run: cargo doc --all-features --no-deps
