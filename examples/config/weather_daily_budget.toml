[[policies]]
name = "weatherapi-daily-free-plan"
provider = "weatherapi"
domain = "weather"
resource = "forecast"
subject = "global"
unit = "requests"
hard_limit = 1000
exhausted_action = "use_stale_cache"
fail_mode = "closed"

[policies.window]
type = "calendar_day"
timezone = "Africa/Lusaka"

[policies.strategy]
type = "preserve_for_window"
max_spend_ahead_percent = 15
emergency_reserve_percent = 10
